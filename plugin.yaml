name: xpulse
version: 0.1.0
author: xcore team's
description: >
  XPulse est un systeme de notification realtime

execution_mode: trusted
entry_point: src/main.py

requires:
  - name: auth
    version: ">=1.0.0, <1.3.0"

# ── Imports autorisés ────────────────────────────────────────────────────────
allowed_imports:
  # Web framework
  - fastapi
  # Redis pub/sub asyncio
  - redis
  # Stdlib
  - asyncio
  - dataclasses
  - json
  - logging
  - re
  - typing

permissions:
  - resource: "xpulse.publish"
    actions: ["*"]
    effect: "allow"
  - resource: "xpulse.broadcast"
    actions: ["*"]
    effect: "allow"
  - resource: "xpulse.email"
    actions: ["*"]
    effect: "allow"

resources:
  timeout_seconds: 10
  max_memory_mb: 100
  max_disk_mb: 1
  rate_limit:
    calls: 100
    period_seconds: 60

runtime:
  health_check:
    enabled: true
    interval_seconds: 60
    timeout_seconds: 3

  retry:
    max_attempts: 3
    backoff_seconds: 3.0

envconfiguration:
  inject: false
  env_file: .env

env:
  url: redis://localhost:6379/0
  channel: ["notification", "systeme", "hunters", "alerts"]
  MAX_CONCURRENT_STREAMS: 10
  MAX_CHANNELS_PER_STREAM: 10
  HEARTBEAT_INTERVAL: 10
  MESSAGE_TIMEOUT: 10
  RECONNECT_MAX_RETRIES: 10
  RECONNECT_BASE_DELAY: 10

rbac:
  grants:
    - name: xpulse:admin:publish
      description: "Envoi d'une notification a tout les utilisateurs"
      tenant_grantable: false
      group: "notification"

    - name: xpulse:tennant:publish
      description: "Envoi d'une notification a tout les utilisateurs"
      tenant_grantable: true
      group: "notification"

    - name: xpulse:admin:broadcast
      description: "Envoi d'une notification a tout les utilisateurs"
      tenant_grantable: false
      group: "notification"

    - name: xpulse:tennant:broadcast
      description: "Envoi d'une notification a tout les utilisateurs"
      tenant_grantable: true
      group: "notification"
